services:
  - type: web
    name: market-intelligence-api
    plan: free
    env: python
    buildCommand: "pip install -r python-backend/requirements.txt"
    startCommand: "cd python-backend && gunicorn engine:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: market-intelligence-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: 20.11.0

